<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto BitSpace - Feria Tecnológica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            overflow: hidden;
            font-family: 'Vollkorn', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #000000;
            padding: 2rem;
        }

        .logo-container {
            margin-bottom: 1vh;
        }

        .logo {
            max-width: 40vw;
            height: auto;
        }

        h1 {
            font-size: 5vw;
            font-weight: 700;
            text-align: center;
            color: #0099cc;

            letter-spacing: 0.15em;
            margin-bottom: 0vh;
            text-shadow: 
                0 2px 5px rgba(0, 0, 0, 0.2),
                0 4px 10px rgba(0, 153, 204, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .reto-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2vh;
        }

        h2 {
            font-size: 5.5vw;
            font-weight: 900;
            color: #333333;
            text-shadow: 
                0 2px 5px rgba(0, 0, 0, 0.15);
            white-space: nowrap;
        }

        .premio {
            font-size: 6.5vw;
            font-weight: 900;
            color: #ff9900;
            text-shadow: 
                0 3px 8px rgba(0, 0, 0, 0.25),
                0 5px 15px rgba(255, 153, 0, 0.3);
            animation: rotateFlip 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes rotateFlip {
            0%, 60% {
                transform: rotateZ(0deg);
                opacity: 1;
            }
            70% {
                transform: rotateZ(180deg);
                opacity: 1;
            }
            80% {
                transform: rotateZ(360deg);
                opacity: 1;
            }
            100% {
                transform: rotateZ(360deg);
                opacity: 1;
            }
        }

        /* Responsive para pantallas más pequeñas */
        @media (max-width: 768px) {
            h1 {
                font-size: 6.5vw;
                letter-spacing: 0.1em;
            }
            
            h2 {
                font-size: 7vw;
            }
            
            .premio {
                font-size: 8vw;
            }
            
            .logo {
                max-width: 35vw;
            }
        }

        /* Para pantallas ultra anchas */
        @media (min-width: 1920px) {
            h1 {
                font-size: 4.5vw;
            }
            
            h2 {
                font-size: 5vw;
            }
            
            .premio {
                font-size: 5.5vw;
            }
        }

        .decorative-character {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 12vw;
            max-width: 200px;
            height: auto;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <video class="logo" autoplay loop muted playsinline>
            <source src="src/assets/images/pantalla.webm" type="video/webm">
        </video>
    </div>

    <h1>Reto de BitSpace</h1>

    <div class="reto-container">
        <h2>&lt; 4 horas al día</h2>

        <h2>=</h2>
        <span class="premio">¡¡SORPRESA!!</span>
    </div>

    <img src="src/assets/images/Bits_Background/Bit_triste.png" alt="" class="decorative-character">
</body>
</html>
